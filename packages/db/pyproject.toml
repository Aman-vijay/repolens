[project]
name = "repolens-db"
version = "0.1.0"
description = "RepoLens shared DB kernel (SQLAlchemy models + session)"
requires-python = ">=3.11"
dependencies = [
    "sqlalchemy[asyncio]>=2.0",
    "asyncpg>=0.29",
]

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]
