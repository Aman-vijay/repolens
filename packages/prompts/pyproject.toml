[project]
name = "repolens-prompts"
version = "0.1.0"
description = "RepoLens shared prompt templates"
requires-python = ">=3.11"
dependencies = [
    "jinja2>=3.1",
]

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
prompts = ["*.md"]
