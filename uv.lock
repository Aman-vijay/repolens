version = 1
revision = 3
requires-python = ">=3.11"

[manifest]
members = [
    "repolens",
    "repolens-api",
    "repolens-db",
    "repolens-workers",
]

[[package]]
name = "repolens"
version = "0.1.0"
source = { virtual = "." }

[[package]]
name = "repolens-api"
version = "0.1.0"
source = { virtual = "apps/api" }
dependencies = [
    { name = "repolens-db" },
]

[package.metadata]
requires-dist = [{ name = "repolens-db", editable = "packages/db" }]

[[package]]
name = "repolens-db"
version = "0.1.0"
source = { editable = "packages/db" }

[[package]]
name = "repolens-workers"
version = "0.1.0"
source = { virtual = "workers" }
dependencies = [
    { name = "repolens-db" },
]

[package.metadata]
requires-dist = [{ name = "repolens-db", editable = "packages/db" }]
